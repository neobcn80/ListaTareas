<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Libro Agenda</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="escena">
        <!-- Libro -->
        <div class="libro" id="libro">
            <div class="lomo"></div>
            
            <!-- Portada -->
            <div class="portada" id="portada">
                <h1>📖 Mi Agenda</h1>
                <p>Haz clic para abrir</p>
            </div>

            <!-- Páginas del libro -->
            <div class="paginas-libro" id="paginasLibro">
                <!-- Las páginas se generan dinámicamente -->
            </div>

            <!-- Controles de navegación -->
            <div class="controles-navegacion" id="controlesNav">
                <button class="btn-nav" id="btnAnterior">◀ Anterior</button>
                <span class="indicador-pagina" id="indicadorPagina"></span>
                <button class="btn-nav" id="btnSiguiente">Siguiente ▶</button>
            </div>

            <!-- Botón para cerrar -->
            <button class="btn-cerrar" id="btnCerrar" title="Cerrar agenda">✕</button>
        </div>

        <!-- Índice de páginas (pestañas laterales) -->
        <div class="indice-pestanas" id="indicePestanas"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
